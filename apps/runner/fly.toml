app = "jobgenius-runner"
primary_region = "iad"

[env]
  STORAGE_STATE_PATH = "/data/.state"
  RUNNER_POLL_INTERVAL_MS = "60000"
  RUNNER_CONCURRENCY = "2"
  RUNNER_DRY_RUN = "false"
  RUNNER_WATCHDOG_TIMEOUT_MS = "600000"
  RUNNER_WATCHDOG_CHECK_MS = "30000"
  RUNNER_METRICS_INTERVAL_MS = "60000"
  RUNNER_HEARTBEAT_INTERVAL_MS = "30000"
  STATE_MAX_AGE_DAYS = "14"
  RUNNER_REAUTH_FAILURE_THRESHOLD = "2"
  RUNNER_CIRCUIT_WINDOW_MS = "1800000"
  RUNNER_CIRCUIT_COOLDOWN_MS = "1800000"
  RUNNER_CAPTCHA_THRESHOLD = "3"
  RUNNER_OTP_SMS_THRESHOLD = "3"
  RUNNER_REQUIRED_FIELDS_THRESHOLD = "5"
  JOBSEEKER_MAX_PER_HOUR = "8"
  # JOBGENIUS_API_BASE_URL — set via: fly secrets set JOBGENIUS_API_BASE_URL=https://your-app.vercel.app
  # RUNNER_AUTH_TOKEN — set via: fly secrets set RUNNER_AUTH_TOKEN=your-token
  # OPS_API_KEY — set via: fly secrets set OPS_API_KEY=your-ops-key
  # RUNNER_DEFAULT_EMAIL — set via: fly secrets set RUNNER_DEFAULT_EMAIL=email@example.com

[mounts]
  source = "runner_state"
  destination = "/data"

[processes]
  app = "sh -c \"RUNNER_ID=${RUNNER_ID:-$HOSTNAME} npm start\""
