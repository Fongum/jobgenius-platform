app = "jobgenius-runner"
primary_region = "iad"

[env]
  STORAGE_STATE_PATH = "/data/.state"
  RUNNER_POLL_INTERVAL_MS = "5000"
  PLAYWRIGHT_HEADLESS = "true"
  PLAYWRIGHT_NAVIGATION_TIMEOUT_MS = "45000"
  PLAYWRIGHT_ACTION_TIMEOUT_MS = "15000"
  # API_BASE_URL — set via: fly secrets set API_BASE_URL=https://your-app.vercel.app
  # RUNNER_AUTH_TOKEN — set via: fly secrets set RUNNER_AUTH_TOKEN=your-runner-token
  # JOBGENIUS_API_KEY — optional legacy alias for RUNNER_AUTH_TOKEN

[mounts]
  source = "runner_state"
  destination = "/data"

[processes]
  app = "sh -c \"RUNNER_ID=${RUNNER_ID:-$HOSTNAME} npm start\""
