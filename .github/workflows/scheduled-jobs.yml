name: Scheduled Jobs

on:
  # Every 5 minutes: ops alerts
  schedule:
    - cron: "*/5 * * * *"
    # Every 15 minutes: outreach scheduler
    - cron: "*/15 * * * *"
    # Daily retention (03:00 UTC)
    - cron: "0 3 * * *"
    # Daily intelligence feedback loop (05:00 UTC)
    - cron: "0 5 * * *"
  # Manual trigger for testing
  workflow_dispatch:

jobs:
  ops-alerts:
    name: Ops Alerts
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call ops alerts endpoint
        env:
          WEB_BASE_URL: ${{ secrets.WEB_BASE_URL }}
          OPS_API_KEY: ${{ secrets.OPS_API_KEY }}
        run: |
          curl -fsS -H "x-ops-key: ${OPS_API_KEY}" "${WEB_BASE_URL}/api/ops/alerts/run"

  background-jobs:
    name: Background Jobs
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call background jobs endpoint
        env:
          WEB_BASE_URL: ${{ secrets.WEB_BASE_URL }}
          OPS_API_KEY: ${{ secrets.OPS_API_KEY }}
        run: |
          curl -fsS -H "x-ops-key: ${OPS_API_KEY}" "${WEB_BASE_URL}/api/background/run"

  outreach-scheduler:
    name: Outreach Scheduler
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call outreach scheduler endpoint
        env:
          WEB_BASE_URL: ${{ secrets.WEB_BASE_URL }}
          OPS_API_KEY: ${{ secrets.OPS_API_KEY }}
        run: |
          curl -fsS -H "x-ops-key: ${OPS_API_KEY}" "${WEB_BASE_URL}/api/outreach/scheduler/run"

  retention:
    name: Retention Cleanup
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call retention endpoint
        env:
          WEB_BASE_URL: ${{ secrets.WEB_BASE_URL }}
          OPS_API_KEY: ${{ secrets.OPS_API_KEY }}
        run: |
          curl -fsS -H "x-ops-key: ${OPS_API_KEY}" "${WEB_BASE_URL}/api/ops/retention/run"

  gmail-inbox-scan:
    name: Gmail Inbox Scan
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Scan Gmail inboxes
        env:
          WEB_BASE_URL: ${{ secrets.WEB_BASE_URL }}
          OPS_API_KEY: ${{ secrets.OPS_API_KEY }}
        run: |
          curl -fsS -H "x-ops-key: ${OPS_API_KEY}" "${WEB_BASE_URL}/api/gmail/scan"

  intelligence-feedback:
    name: Intelligence Feedback Loop
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 5 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call intelligence endpoint
        env:
          WEB_BASE_URL: ${{ secrets.WEB_BASE_URL }}
          OPS_API_KEY: ${{ secrets.OPS_API_KEY }}
        run: |
          curl -fsS -H "x-ops-key: ${OPS_API_KEY}" "${WEB_BASE_URL}/api/ops/intelligence/run"
